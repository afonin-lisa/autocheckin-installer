services:
  app:
    image: ${REGISTRY}/autocheckin:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports: ["127.0.0.1:8800:8000"]
    env_file: .env
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - autocheckin

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes: ["pg_data:/var/lib/postgresql/data"]
    environment:
      POSTGRES_DB: autocheckin
      POSTGRES_USER: autocheckin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autocheckin"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autocheckin

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes: ["redis_data:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autocheckin

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports: ["80:80", "443:443"]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app: {condition: service_healthy}
    networks:
      - autocheckin

  autoheal:
    image: willfarrell/autoheal
    restart: always
    environment:
      AUTOHEAL_CONTAINER_LABEL: all
      AUTOHEAL_INTERVAL: 60
      AUTOHEAL_START_PERIOD: 120
      AUTOHEAL_DEFAULT_STOP_TIMEOUT: 30
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - autocheckin

volumes:
  pg_data:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  autocheckin:
    driver: bridge
